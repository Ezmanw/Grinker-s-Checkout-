<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Checkout Launcher</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0');

    :root {
      --md-sys-color-primary: #81C784;
      --md-sys-color-on-primary: #003314;
      --md-sys-color-primary-container: #005024;
      --md-sys-color-on-primary-container: #A3F9A6;

      --md-sys-color-secondary: #A5D6A7;
      --md-sys-color-on-secondary: #0D3915;
      --md-sys-color-secondary-container: #25502A;
      --md-sys-color-on-secondary-container: #C0F3C1;

      --md-sys-color-background: #0D1610;
      --md-sys-color-on-background: #E1E3DF;

      --md-sys-color-surface: #101B13;
      --md-sys-color-on-surface: #E1E3DF;
      --md-sys-color-surface-variant: #414942;
      --md-sys-color-on-surface-variant: #C1C9BF;

      --md-sys-color-outline: #8B938A;
      --shape-extra-large: 36px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }

    .panel {
      background: rgba(16, 27, 19, 0.86);
      border-radius: var(--shape-extra-large);
      padding: 24px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-top: 16px;
    }

    .button-row {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary { background: #81C784; color: #003314; }
    .tonal { background: #25502A; color: #C0F3C1; }
    .ghost { background: rgba(255,255,255,0.05); color: white; }

    .launch-card {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 12px;
      padding: 16px;
      border-radius: 24px;
      background: rgba(255,255,255,0.03);
      text-decoration: none;
      color: inherit;
      margin-bottom: 12px;
    }

    .icon-bubble {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1;
    }
  </style>
</head>

<body>
  <main class="shell">

    <section class="panel hero">
      <h1>Virtual Checkout</h1>
      <p>Pick a page and jump in.</p>

      <div class="button-row">
        <a class="button primary" id="btn-home-scanner" href="#">
          <span class="material-symbols-outlined">qr_code_scanner</span>
          Checkout
        </a>

        <a class="button tonal" id="btn-home-secondary" href="#">
          <span class="material-symbols-outlined">phone_android</span>
          Mobile companion
        </a>

        <button class="button ghost" id="btn-copy-links">
          <span class="material-symbols-outlined">content_copy</span>
          Copy links
        </button>
      </div>
    </section>

    <section class="panel chooser">
      <h2>Pages</h2>
      <div id="page-list"></div>
    </section>

  </main>

  <script>
    const PAGES = [
      {
        name: 'Scanner',
        file: 'scanner.html',
        icon: 'qr_code_scanner',
        description: 'Main scanning interface.',
        cta: 'Launch'
      },
      {
        name: 'Mobile companion',
        file: 'mobile.html',
        icon: 'phone_android',
        description: 'Phone-side controls.',
        cta: 'Launch'
      }
    ];

    const pageList = document.getElementById('page-list');

    const makeCard = (page) => {
      const a = document.createElement('a');
      a.className = 'launch-card';
      a.href = page.file;

      a.innerHTML = `
        <div class="icon-bubble">
          <span class="material-symbols-outlined">${page.icon}</span>
        </div>
        <div>
          <strong>${page.name}</strong>
          <p>${page.description}</p>
        </div>
        <div>${page.cta}</div>
      `;
      return a;
    };

    PAGES.forEach(p => pageList.appendChild(makeCard(p)));

    document.getElementById('btn-home-scanner').href = PAGES[0].file;
    document.getElementById('btn-home-secondary').href = PAGES[1].file;

    document.getElementById('btn-copy-links').addEventListener('click', async () => {
      const text = PAGES.map(p => `${p.name}: ${p.file}`).join('\n');
      try {
        await navigator.clipboard.writeText(text);
        alert('Copied links');
      } catch {
        alert(text);
      }
    });
  </script>

</body>
</html>
